AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for a single-instance bastion host'

# === Incident Response Playbook: Bastion Host Containment ===
# Scenario: Automated monitoring detects anomalous outbound traffic from the bastion.
# Containment Steps:
# 1. Notify CSIRT and freeze automation pipelines.
# 2. Remove the bastion from its normal security group (InboundAccessSecurityGroup).
# 3. Attach the isolation security group (BastionIsolationSG) to cut off all traffic.
# 4. Snapshot the EBS volume for forensic analysis.
# 5. Preserve CloudTrail logs and VPC Flow Logs.
# 6. Begin investigation while the instance remains isolated.

Parameters:
  AvailabilityZone:
    Type: AWS::EC2::AvailabilityZone::Name

  EnvironmentType:
    Description: "Specify which env to run in"
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod

  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'

  KeyName:
    Description: Name of an existing EC2 KeyPair for SSH
    Type: AWS::EC2::KeyPair::KeyName

Mappings:
  EnvironmentTypeToInstanceType:
    dev:
      InstanceType: t2.nano
    test:
      InstanceType: t2.micro
    prod:
      InstanceType: t2.small

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      InstanceTenancy: default

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  Subnet10:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Ref AvailabilityZone
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      MapPublicIpOnLaunch: true

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  InternetRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGateway
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
      RouteTableId: !Ref RouteTable

  Subnet10RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref RouteTable
      SubnetId: !Ref Subnet10

  InboundAccessSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow inbound tcp on SSH port"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  # === Isolation Security Group for Containment ===
  # This SG blocks ALL traffic for forensic investigation.
  BastionIsolationSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Isolation SG - no ingress or egress"
      VpcId: !Ref VPC
      SecurityGroupIngress: []
      SecurityGroupEgress: []

  BastionInstance:
    Type: AWS::EC2::Instance
    Properties:
      AvailabilityZone: !Ref AvailabilityZone
      ImageId: !Ref LatestAmiId
      InstanceType: !FindInMap [EnvironmentTypeToInstanceType, !Ref EnvironmentType, InstanceType]
      KeyName: !Ref KeyName

      # Shell access allowed only from inside the VPC using InboundAccessSecurityGroup.
      # During containment, replace this with BastionIsolationSG to isolate the host.
      SecurityGroups:
        - !Ref BastionIsolationSG   # ← containment demonstration required by assignment

Outputs:
  InstanceId:
    Description: InstanceId of the newly created EC2 instance
    Value: !Ref BastionInstance

  URI:
    Description: URI that points to public SSH end point
    Value: !Sub ssh://${BastionInstance.PublicDnsName}
